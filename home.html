<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Quest</title>
	<style>
		html {
    scroll-behavior: smooth;}

	body,h1,h2,p,ul{margin:0; padding:0;}

	section{
		min-width: 1600px;
		height: auto;
		margin: auto;
		padding: 0;
		background-color: #222222; 
		overflow: hidden;
	}

	.top-nav {
    position: absolute;
    top: 50px; 
    right: 100px; 
    z-index: 100; 
}

.top-nav ul {
    display: flex;
    gap: 40px; 
    list-style: none;
}

.top-nav a {
    font-family: 'Times New Roman', serif;
    font-size: 24px;
    font-weight: bold;
    color: ghostwhite;
    text-decoration: none;
    letter-spacing: 1px;
    transition: color 0.3s ease;
}


.top-nav a:hover {
    color: #16AAAA; 
}


.side-title {
    position: absolute;
    top: 70px;
    left: 70px; 
    z-index: 100;
}

.side-title a {
    font-family: 'Times New Roman', serif;
    font-size: 32px;
    font-weight: bold;
    color: ghostwhite;
    text-decoration: none;
    letter-spacing: 4px;

    writing-mode: vertical-rl; 
    text-transform: uppercase; 
    
    transition: opacity 0.3s ease;
}

.side-title a:hover {
    opacity: 0.7;
}


.side-title {
    position: absolute;
    top: 70px;
    left: 70px; 
    z-index: 100;
}

.side-title a {
    font-family: 'Times New Roman', serif;
    font-size: 32px;
    font-weight: bold;
    color: ghostwhite;
    text-decoration: none;
    letter-spacing: 4px;

    writing-mode: vertical-rl; 
    text-transform: uppercase; 
    
    transition: opacity 0.3s ease;
}

.side-title a:hover {
    opacity: 0.7;
}

.right-scroll-nav {
    position: fixed;
    top: 50%;
    right: 0;
    transform: translateY(-50%);
    width: 150px;
    height: 600px;
    z-index: 200; 
    display: flex;
    justify-content: flex-end;
    align-items: center;
    pointer-events: none;
}

.right-scroll-nav::before {
    content: '';
    position: absolute;
    top: 0;
    right: -250px; 
    width: 400px;
    height: 600px;
    border: 2px solid rgba(22, 170, 170, 0.3); 
    border-radius: 50%;
}

.right-scroll-nav ul {
    list-style: none;
    position: relative;
    right: 15px;
    display: flex;
    flex-direction: column;
    gap: 110px; 
    align-items: flex-end;
    pointer-events: auto; 
}

.right-scroll-nav a {
    font-family: 'Noto Sans Kr', serif;
    font-size: 18px;
    font-weight: bold;
    color: #333d42;
    text-decoration: none;
    display: block;
    transition: all 0.4s cubic-bezier(0.1, 0.8, 0.2, 1); 
}


.right-scroll-nav li.active a {
    color: #16AAAA !important; 
    font-size: 26px !important; 
    text-shadow: none !important; 
}

.right-scroll-nav li:nth-child(1) { transform: translateX(-70px); }
.right-scroll-nav li:nth-child(2) { transform: translateX(-90px); }  
.right-scroll-nav li:nth-child(3) { transform: translateX(-70px); } 

.title {
		position: relative;
		padding: 200px 200px 300px 200px ;
		display: block;
		margin: auto;
	}

	.title p{
		font-weight: regular;
		font-size: 18px;
		line-height: 30px;
		text-align: left;
		padding: 20px 0px;
		padding-left: 0px;
		word-break: keep-all;
		color:#E0E0E0;
		max-width: none;
	}

	h1{	position: relative;
		font-family: 'Times New Roman', serif;
		font-size: 300px;
		color:#FF6B6B;
		letter-spacing: -6px;
		transform: scaleX(0.8);
		display: inline-block;
		transform-origin: left top; 
		z-index: 5;
		text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
	}


	.archtitle{
		position: relative;
		padding: 200px 0 200px 0;
		display: block;
	}

	.archnum{
		font-weight: regular;
		font-size: 23px;
		text-align: left;
		padding: 0px 200px 10px 200px; 
		word-break: keep-all;
		color:#16AAAA;
		z-index: 5} 

	.content{
		position: relative;
		padding: 250px 250px;
		margin: auto;
		display: block;
	}

	h2{ position: relative;
		font-family: 'noto sans kr', serif;
		font-size: 150px;
		color: #E0E0E0; 
		line-height: auto;
		padding: 0 200px;
		z-index: 5;
		text-shadow: 0 2px 15px rgba(0, 0, 0, 0.7);
	}

	p {	position: relative;
		z-index: 5;
		font-weight: normal;
		font-size: 26px;
		line-height: 46px;
		text-align: left;
		max-width: 550px;
		padding: 40px 100px;
		word-break: keep-all;
		color:#E0E0E0;
		text-shadow: 0 2px 15px rgba(0, 0, 0, 0.7);

	}
	.coverimg {position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height:100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
            pointer-events: none;}
.quotes p{
		text-align: left;
		font-weight: bold;
		font-size: 48px;
		line-height: 80px;
		max-width: none;
		color:#FF7676;
		text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
		padding: 0px;
}
	.lastquotes{padding-bottom: 400px}

	.lastquotes p{
		text-align: left;
		font-weight: bold;
		font-size: 42px;
		line-height: 80px;
		color:#16AAAA;
		text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
		padding: 0px 250px;
		max-width: none;
	}
 


	</style>
</head>
<body>

	<section>
		<div class="title">
			<h1>HOME</h1>
			<p class="title">
				왕비 페넬로페는
				구혼자들에게 마지막<br> 
				시험을 제안한다.

</html>
